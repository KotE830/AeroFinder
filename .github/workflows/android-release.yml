name: Android Build and Release APK

on:
  push:
    branches:
      - main
    paths:
      - 'android/**'
  workflow_dispatch:

jobs:
  build:
    name: Build APK and Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x ./android/gradlew

      - name: Decode Google Services Config
        env:
          GOOGLE_SERVICES_JSON_BASE64: ${{ secrets.GOOGLE_SERVICES_JSON_BASE64 }}
        run: echo "$GOOGLE_SERVICES_JSON_BASE64" | tr -d '\n\r ' | base64 --decode > android/app/google-services.json

      - name: Decode Keystore
        env:
          ENCODED_STRING: ${{ secrets.KEYSTORE_BASE64 }}
        run: echo "$ENCODED_STRING" | tr -d '\n\r ' | base64 --decode > android/app/release.jks

      - name: Build with Gradle
        working-directory: ./android
        env:
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEYALIAS_NAME: ${{ secrets.KEYALIAS_NAME }}
          KEYALIAS_PASSWORD: ${{ secrets.KEYALIAS_PASSWORD }}
        run: ./gradlew assembleRelease

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: android/app/build/outputs/apk/release/app-release.apk
          name: Auto-Release ${{ github.run_number }}
          tag_name: v1.0.${{ github.run_number }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK as Artifact (Fallback if not tagged)
        uses: actions/upload-artifact@v4
        if: github.ref == 'refs/heads/main'
        with:
          name: app-release.apk
          path: android/app/build/outputs/apk/release/app-release.apk
